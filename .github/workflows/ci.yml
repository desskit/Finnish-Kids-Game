# Runs the test suite on every push/PR: type checks, unit/component tests
# (Vitest), and a headless Playwright smoke test against a real production
# build. Separate from deploy.yml, which only publishes `main` to Pages.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run icons
      - run: npm run typecheck
      - run: npm run typecheck:test
      - run: npm run test:unit
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
